name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [server, client-linux, client-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true
      - uses: nix-community/cache-nix-action@v7
        with:
          # per-target cache; the exact key busts on lock changes, but the prefix
          # restore brings the previous store so nix only rebuilds the delta
          primary-key: nix-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.target }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ matrix.target }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build ${{ matrix.target }}
        run: nix build .#${{ matrix.target }} --print-build-logs -o result
      - name: Stage windows exe
        if: matrix.target == 'client-windows'
        run: |
          mkdir -p dist
          cp result/bin/client.exe dist/chat-rs-client-windows-x86_64.exe
      - name: Upload windows artifact
        if: matrix.target == 'client-windows'
        uses: actions/upload-artifact@v7
        with:
          name: chat-rs-client-windows
          path: dist/*.exe
  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: chat-rs-client-windows
          path: dist
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
