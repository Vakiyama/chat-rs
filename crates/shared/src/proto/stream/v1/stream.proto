syntax = "proto3";
package stream.v1;

import "google/protobuf/timestamp.proto";

service StreamService {
  rpc ConnectTextStream (stream ClientTextMessage) returns (stream ServerTextMessage);
  rpc ConnectVoiceStream (stream ClientVoiceMessage) returns (stream ServerVoiceMessage);
}

// Voice Streams:

message SessionDescription {
  string RTCSessionDescription = 1;
}

message ServerVoiceMessage {
  oneof payload {
    SessionDescription offer = 1;
    SessionDescription answer = 2;
  }
}

message ClientVoiceMessage {
  oneof payload {
    SessionDescription offer = 1;
    SessionDescription answer = 2; 
  }
}

// Text streams:

message DisplayUser {
  string id = 1;
  string name = 2;
}

message Post {
  string id = 1;
  string server_id = 2;
  string author_name = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
}

message JoinedRoom {
  DisplayUser from = 1;
}

message LeftRoom {
  DisplayUser from = 1;
}

message ServerTextMessage {
  oneof payload {
    JoinedRoom  joined_room = 1;
    LeftRoom    left_room   = 2;
    Post        chat        = 3;
  }
}

message ClientTextMessage {
  oneof payload {
    CreatePostRequest post = 1;
  }
}

message CreatePostRequest {
  string id = 1;
  string content = 2;
  string channel_id = 3;
}
