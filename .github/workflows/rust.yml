name: Rust
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  CARGO_TERM_COLOR: always
  JWT_KEY: 0123456789abcdef0123456789abcdef
  ENV: DEV
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install native deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p chat-client
      - uses: actions/upload-artifact@v4
        with:
          name: chat-rs-windows
          path: target/release/client.exe
        env: 
          SERVER_URL: ${{ secrets.SERVER_URL }}
