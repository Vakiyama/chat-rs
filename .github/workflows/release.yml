name: Release
on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - flake.nix
      - flake.lock
      - Cargo.lock
      - crates/**
      - .github/workflows/release.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build
        run: |
          nix build .#server -o result-server
          nix build .#client-linux -o result-client-linux
          nix build .#client-windows -o result-client-windows
      - name: Stage windows exe
        run: |
          mkdir -p dist
          cp result-client-windows/bin/client.exe dist/chat-rs-client-windows-x86_64.exe
      - name: Upload artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: chat-rs-client-windows
          path: dist/*.exe
      - name: Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
