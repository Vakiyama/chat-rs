syntax = "proto3";
package stream.v1;

import "google/protobuf/timestamp.proto";

service StreamService {
  rpc ConnectTextStream (stream ClientTextMessage) returns (stream ServerTextMessage);
  rpc ConnectVoiceStream (stream ClientVoiceMessage) returns (stream ServerVoiceMessage);
}

// Voice Streams:

message SessionDescriptionWithId {
  string description = 1;
  string voice_channel_id = 2;
}

message ServerVoiceMessage {
  oneof payload {
    SessionDescriptionWithId offer = 1;
    SessionDescriptionWithId answer = 2;
    PresenceSnapshot snapshot    = 3;
  }
}

message LeaveRoom {
  string voice_channel_id = 1;
}


message ClientVoiceMessage {
  oneof payload {
    SessionDescriptionWithId offer = 1;
    SessionDescriptionWithId answer = 2;
    LeaveRoom leave_room = 3;
    Speaking speaking = 4;
    SubscribeServer subscribe_server = 5;
    SetMuted set_muted = 6;
    SetDeafened set_deafened = 7;
  }
}

message Speaking {
  bool speaking = 1;
  string voice_channel_id = 2;
}

message SetMuted {
  bool muted = 1;
  string voice_channel_id = 2;
}

message SetDeafened {
  bool deafened = 1;
  string voice_channel_id = 2;
}

// Watch all voice-call presence for a single server. The server replies with a
// PresenceSnapshot per active room in that server, and keeps pushing membership
// snapshots as calls in that server change.
message SubscribeServer {
  string server_id = 1;
}

message PresenceSnapshot {
  repeated DisplayVoiceUser peers = 1;
  string voice_channel_id = 2;
  string server_id = 3;
}

message DisplayVoiceUser {
  DisplayUser user = 1;
  bool muted = 2;
  bool deafened = 3;
  bool speaking = 4;
}

// Text streams:

message DisplayUser {
  string id = 1;
  string name = 2;
}

message Post {
  string id = 1;
  string author_name = 2;
  string content = 3;
  google.protobuf.Timestamp created_at = 4;
}

message JoinedRoom {
  DisplayUser from = 1;
}

message LeftRoom {
  DisplayUser from = 1;
}

message ServerTextMessage {
  oneof payload {
    JoinedRoom         joined_room = 1;
    LeftRoom           left_room   = 2;
    Post               chat        = 3;
    Pong               pong        = 4;
    TypingNotification typing      = 5;
  }
}

message ClientTextMessage {
  oneof payload {
    CreatePostRequest post = 1;
    Ping        ping        = 2;
    Typing      typing      = 3;
  }
}

// A client signals it's actively typing in a text channel. Sent throttled while
// the user edits the input; the server fans it out to the other clients.
message Typing {
  string text_channel_id = 1;
}

// The server tells clients that `from` is typing in `text_channel_id`. Clients
// show a transient indicator and expire it on their own timeout.
message TypingNotification {
  DisplayUser from = 1;
  string text_channel_id = 2;
}

message Ping {
  uint64 timestamp = 1;
}

message Pong {
  uint64 timestamp = 1;
  uint64 server_received_at = 2;
}

message CreatePostRequest {
  string id = 1;
  string content = 2;
  string text_channel_id = 3;
}
