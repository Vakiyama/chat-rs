[package]
name = "chat-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.8", features = ["ws", "macros"] }
futures-util = { version = "0.3.31", features = ["sink", "std"] }
iced = { version = "0.14.0", features = ["tokio", "sipper", "image"] }
tokio = { version = "1.49.0", features = ["full"] }
tokio-tungstenite = "0.28.0"
dotenvy = "0.15"
sea-orm = { version = "2.0.0-rc", features = [ "sqlx-postgres", "runtime-tokio-native-tls", "macros" ] }
async-tungstenite = { version = "0.32.1", features = [ "tokio-runtime" ] }
rkyv = { version = "0.8.15", features = ["uuid-1", "alloc"] }
bytes = "1.11.1"
rand = "0.10.0"
resend-rs = "0.21.1"
email_address = "0.2.9"
utoipa-axum = "0.2.0"
utoipa = { version = "5.4.0", features = [ "uuid" ] }
serde = "1.0.228"
jwt-simple = { version = "0.12.14", default-features = false, features = ["pure-rust"] }
hex = "0.4.3"
utoipa-swagger-ui = { version = "9.0.2", features = ["axum"] }
tower-http = { version = "0.6.8", features = ["auth"] }
http-body-util = { version = "0.1.3", features = [ "full" ] }
http = "1.4.0"
anyhow = "1.0.102"
tower = "0.5.3"
progenitor = "0.13.0"

[dependencies.uuid]
version = "1.19.0"
features = [
    "v4",
    "serde"
]
