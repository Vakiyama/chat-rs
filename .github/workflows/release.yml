name: Release
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [server, client-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true
      - uses: nix-community/cache-nix-action@v7
        with:
          # caches saved on the default branch (main) are restorable by every
          # ref, including tag releases — so warming on main fixes the cold
          # cross-tag build without a separate ref-scoped cache per tag.
          primary-key: nix-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.target }}-
          gc-max-store-size-linux: 5G
      - name: Build ${{ matrix.target }}
        run: nix build .#${{ matrix.target }} --print-build-logs -o result
  # The flake cross-compiles the client to x86_64-pc-windows-gnu (mingw), which
  # crashes on call join. Until that's fixed, ship the Windows client from a
  # native MSVC build on a Windows runner — the previously known-good path.
  build-windows:
    runs-on: windows-latest
    env:
      # bake the same server URL the flake clients use (chat-client reads this
      # via option_env! at compile time)
      DEFAULT_SERVER_URL: http://5.78.193.193:3000
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build client (release)
        run: cargo build --release --locked -p chat-client
      - name: Stage windows exe
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/client.exe dist/chat-rs-client-windows-x86_64.exe
      - name: Upload windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: chat-rs-client-windows
          path: dist/*.exe
  release:
    needs: [build, build-windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: chat-rs-client-windows
          path: dist
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
