syntax = "proto3";
package stream.v1;

service StreamService {
  rpc ConnectTextStream (stream ClientTextMessage) returns (stream ServerTextMessage);
  rpc ConnectVoiceStream (stream ClientVoiceMessage) returns (stream ServerVoiceMessage);
}

// Voice Streams:

message Stub {
  string stub = 1;
}

message ServerVoiceMessage {
  oneof payload {
    Stub stub = 1;
  }
}

message ClientVoiceMessage {
  oneof payload {
    Stub stub = 1;
  }
}

// Text streams:

message DisplayUser {
  string id = 1;
  string name = 2;
}

message ChatMessage {
  DisplayUser from = 1;
  string text = 2;
}

message JoinedRoom {
  DisplayUser from = 1;
}

message LeftRoom {
  DisplayUser from = 1;
}

message ServerTextMessage {
  oneof payload {
    JoinedRoom  joined_room = 1;
    LeftRoom    left_room   = 2;
    ChatMessage chat        = 3;
  }
}

message ClientTextMessage {
  oneof payload {
    ChatMessage chat = 1;
  }
}
