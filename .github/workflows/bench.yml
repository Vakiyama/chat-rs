name: Build bench
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  cargo-release:
    runs-on: ubuntu-latest
    env:
      JWT_KEY: 0123456789abcdef0123456789abcdef
      ENV: DEV
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench
      - name: Install native deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev protobuf-compiler
      - name: Build server (cargo --release)
        run: |
          start=$(date +%s)
          cargo build --release --locked -p chat-server
          echo "cargo --release chat-server: $(($(date +%s) - start))s" | tee -a "$GITHUB_STEP_SUMMARY"
  nix-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: bench-nix-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: bench-nix-
      - name: Build server (nix build .#server)
        run: |
          start=$(date +%s)
          nix build .#server --print-build-logs -o result
          echo "nix build .#server: $(($(date +%s) - start))s" | tee -a "$GITHUB_STEP_SUMMARY"
